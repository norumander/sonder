services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sonder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sonder}
      POSTGRES_DB: ${POSTGRES_DB:-sonder}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonder}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      SONDER_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sonder}:${POSTGRES_PASSWORD:-sonder}@db:5432/${POSTGRES_DB:-sonder}
      SONDER_CORS_ORIGINS: '["*"]'
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_GOOGLE_CLIENT_ID: ${SONDER_GOOGLE_CLIENT_ID:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
