services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: sonder
      POSTGRES_PASSWORD: sonder
      POSTGRES_DB: sonder
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SONDER_DATABASE_URL: postgresql+asyncpg://sonder:sonder@db:5432/sonder
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
